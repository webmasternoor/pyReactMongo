name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}

            script: |
                cd /home/ubuntu/pyReactMongo

                git fetch origin
                git reset --hard origin/main

                cd frontend

                npm ci
                npm run build

                sudo rm -rf /var/www/pyreactmongo/*
                sudo cp -r dist/* /var/www/pyreactmongo/

                cd ../backend

                source .venv/bin/activate
                pip install -r requirements.txt

                sudo systemctl restart pyreactmongo
                sudo systemctl reload nginx